name: Run Telegram Cloud Hosting Bot

on:
  push:
    branches: [ "main", "master" ] # ကုဒ်အသစ် တင်လိုက်တိုင်း Run မယ်
  schedule:
    - cron: '*/20 * * * *' # မိနစ် ၂၀ တိုင်း တစ်ကြိမ် အလိုအလျောက် ပြန်ပြန် Run မယ် (24/7 ဖြစ်စေရန်)
  workflow_dispatch: # GitHub Web ပေါ်ကနေ Manual နှိပ်ပြီး Run ချင်ရင် သုံးဖို့

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Telegram Bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        OWNER_ID: ${{ secrets.OWNER_ID }}
        ADMIN_ID: ${{ secrets.ADMIN_ID }}
        RENDER: "true"
      run: |
        # GitHub Actions က ၆ နာရီပြည့်ရင် သူ့အလိုလို ပိတ်တတ်လို့ အချိန်စောင့်စနစ်နဲ့ Run ခိုင်းခြင်း ဖြစ်ပါတယ်
        timeout 340m python dfd.py || true
